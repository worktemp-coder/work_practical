name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit
      - name: Verify app imports
        run: python -c "from app import app; print('App imports OK')"
      - name: Run Bandit SAST scan
        run: |
          bandit -r . \
            --exclude ./.git,./venv,./vuln_app.py,./fixcode.py,./config.py \
            --severity-level medium \
            --confidence-level medium \
            -f txt \
            -o bandit-report.txt || BANDIT_EXIT=$?
          cat bandit-report.txt
          exit ${BANDIT_EXIT:-0}

  trivy-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -t flask-app:ci .
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-app:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 0

  dast-scan:
    runs-on: ubuntu-latest
    needs: [test, trivy-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start Flask app
        run: |
          python app.py &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          for i in {1..15}; do
            if curl -s http://localhost:5000/health > /dev/null; then
              echo "Flask is up"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 1
          done

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:5000
          rules_file_name: .zap/rules.tsv
          cmd_options: '-I'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
