name: CI Pipeline
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 
permissions:
  contents: read
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask==3.0.3 werkzeug==3.0.3
 
      - name: Verify app.py exists
        run: |
          if [ ! -f app.py ]; then
            echo "ERROR: app.py not found"
            exit 1
          fi
          echo "app.py found"
 
      - name: Run Flask health check
        run: |
          python app.py &
          APP_PID=$!
          for i in {1..15}; do
            if curl -s http://localhost:5000/health > /dev/null; then
              echo "Flask is up"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 1
          done
          RESPONSE=$(curl -s http://localhost:5000/health)
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q "status"; then
            echo "Health check passed"
          else
            echo "Health check failed"
            kill $APP_PID
            exit 1
          fi
          kill $APP_PID
 
      - name: Check secret (optional)
        env:
          APP_SECRET: ${{ secrets.MY_APP_SECRET }}
        continue-on-error: true
        run: |
          if [ -z "$APP_SECRET" ]; then
            echo "WARNING: MY_APP_SECRET not set — skipping validation"
          else
            echo "Secret is configured"
            echo "Secret length: ${#APP_SECRET} characters"
          fi
 
  security-scan:
    runs-on: ubuntu-latest
    needs: test
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install Bandit
        run: pip install bandit
 
      - name: Run Bandit SAST scan
        run: |
          bandit -r . \
            --exclude ./.git,./venv,./.venv,./vuln_app.py,./fixcode.py,./config.py,./__pycache__ \
            --severity-level high \
            --confidence-level medium \
            -f txt \
            -o bandit-report.txt || BANDIT_EXIT=$?
          cat bandit-report.txt
          exit ${BANDIT_EXIT:-0}
 
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.txt
 
  trivy-scan:
    runs-on: ubuntu-latest
    needs: test
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Build image for scanning
        run: docker build -t flask-app:ci .
 
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-app:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true
 
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 0
 
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json
 
  semgrep:
    runs-on: ubuntu-latest
    needs: test
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install Semgrep
        run: pip install semgrep
 
      - name: Run Semgrep scan
        run: |
          semgrep --config p/python \
            --config p/flask \
            --exclude vulnerable_app.py \
            --exclude fixed_app.py \
            --exclude code_review_fixed.py \
            --severity ERROR \
            --json \
            --output semgrep-report.json \
            . || SEMGREP_EXIT=$?
          echo "Semgrep exit code: ${SEMGREP_EXIT:-0}"
          exit ${SEMGREP_EXIT:-0}
 
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
 
  dast-scan:
    runs-on: ubuntu-latest
    needs: test
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          pip install flask==3.0.3 werkzeug==3.0.3
 
      - name: Start Flask app
        run: |
          python app.py &
          for i in {1..15}; do
            if curl -s http://localhost:5000/health > /dev/null; then
              echo "Flask is up"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 1
          done
 
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:5000
          cmd_options: '-I'
          fail_action: false
        continue-on-error: true
 
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
 
  sca-scan:
    runs-on: ubuntu-latest
    needs: test
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin
 
      - name: Run Grype SCA scan
        run: |
          grype file:requirements.txt \
            --fail-on high \
            -o table \
            -o json=grype-report.json || GRYPE_EXIT=$?
          echo "Grype exit code: ${GRYPE_EXIT:-0}"
          exit ${GRYPE_EXIT:-0}
 
      - name: Upload Grype report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-sca-report
          path: grype-report.json