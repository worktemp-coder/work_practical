version: "3.9"

services:
  flask:
    build:
      context: .
      target: production
    image: flask-app:multistage
    container_name: flask-hardened
    ports:
      - "127.0.0.1:5000:5000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      - FLASK_DEBUG=false
    restart: unless-stopped